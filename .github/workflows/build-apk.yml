name: Build APK

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.1'
          channel: stable
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Verify install
        run: flutter doctor

      - name: Create signing key
        run: |
          echo "${{ secrets.SIGNING_KEY }}" | base64 -d > android/app/iconvert-release.jks

      - name: Create key.properties
        run: |
          cat > android/key.properties << 'EOF'
          storePassword=${{ secrets.STORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          storeFile=iconvert-release.jks
          EOF

      - name: Build APK (split per ABI)
        run: flutter build apk --split-per-abi --release

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: iconvert-apks
          path: build/app/outputs/flutter-apk/*.apk
          retention-days: 90

      - name: Show build info
        run: |
          echo "## APK 构建完成" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 构建产物" >> $GITHUB_STEP_SUMMARY
          ls -lh build/app/outputs/flutter-apk/*.apk | awk '{print "- `" $9 "`: " $5}' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "下载地址：在 Actions 运行页面下方的 Artifacts 区域" >> $GITHUB_STEP_SUMMARY
