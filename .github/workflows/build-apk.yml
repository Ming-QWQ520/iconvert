name: Build APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.1'
          channel: stable
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Verify install
        run: flutter doctor

      - name: Create signing key
        run: |
          echo "${{ secrets.SIGNING_KEY }}" | base64 -d > android/app/iconvert-release.jks

      - name: Create key.properties
        run: |
          cat > android/key.properties << 'EOF'
          storePassword=${{ secrets.STORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          storeFile=iconvert-release.jks
          EOF

      - name: Build APK (split per ABI, obfuscated, R8)
        run: flutter build apk --split-per-abi --release --obfuscate --split-debug-info=build/debug-info

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: iconvert-apks
          path: build/app/outputs/flutter-apk/*.apk
          retention-days: 90

      - name: Create Release and Upload APKs
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: build/app/outputs/flutter-apk/*.apk
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Show build info
        run: |
          echo "## APK 构建完成" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 构建产物（R8 混淆 + obfuscate）" >> $GITHUB_STEP_SUMMARY
          ls -lh build/app/outputs/flutter-apk/*.apk | awk '{print "- `" $9 "`: " $5}' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Release" >> $GITHUB_STEP_SUMMARY
          echo "推送 v* tag 时自动创建 Release 并上传 APK" >> $GITHUB_STEP_SUMMARY
