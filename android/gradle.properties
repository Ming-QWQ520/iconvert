org.gradle.jvmargs=-Xmx1536m -XX:MaxMetaspaceSize=512m -XX:+HeapDumpOnOutOfMemoryError -Dfile.encoding=UTF-8
android.useAndroidX=true
android.newDsl=false
android.builtInKotlin=false

# 关闭 toolchain 自动检测和下载
org.gradle.java.installations.auto-detect=false
org.gradle.java.installations.auto-download=false
org.gradle.java.installations.paths=/home/z/jdk/extracted/usr/lib/jvm/java-21-openjdk-amd64

# 关闭 daemon 节省内存
org.gradle.daemon=false
org.gradle.parallel=false
org.gradle.caching=false
org.gradle.workers.max=1

# AGP 8 兼容
android.defaults.buildfeatures.buildconfig=false
android.nonTransitiveRClass=false

# 关闭 lint
android.lint.abortOnError=false
android.lint.checkReleaseBuilds=false
android.disableLintVersionCheck=true

# 关键：禁用 Kotlin daemon，让 Kotlin 在 Gradle daemon 进程内编译
kotlin.compiler.execution.strategy=in-process
kotlin.daemon.jvmargs=-Xmx512m
kotlin.daemon.enabled=false

# 关键：禁用 Kotlin K2（减少内存）
kotlin.experimental.tryK2=false
